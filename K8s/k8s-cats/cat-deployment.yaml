apiVersion: apps/v1
kind: Deployment
metadata:
  name: cat-deployment
  labels:
    app: cats
spec:
  selector:
    matchLabels:
      app: cats
  replicas: 3
  template:
    metadata:
      labels:
        app: cats
    spec:
      containers:
      - name: cat-container
        image: 459956101257.dkr.ecr.us-east-1.amazonaws.com/cat-repo:v0.2
        ports:
        - containerPort: 80
